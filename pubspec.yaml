name: expense_tracker
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.1
  
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  flutter_riverpod: 2.6.1
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.1
  file_picker: ^11.0.2
  intl: ^0.20.2
  uuid: ^4.5.3
  connectivity_plus: ^7.1.0
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1


flutter:

  uses-material-design: true

  assets:
    - assets/images/top.png
    - assets/images/bottom.png
    - assets/images/empty.png
    - assets/images/moneybag.png
    - assets/images/others.png
    - assets/images/food.png
    - assets/images/travel.png
    - assets/images/bills.png

  fonts:
    - family: Cera Pro
      fonts:
        - asset: assets/fonts/Cera Pro Medium.otf
        - asset: assets/fonts/Cera Pro Bold.otf
        - asset: assets/fonts/Cera Pro Light.otf
        - asset: assets/fonts/Cera Pro Black.otf

  # fonts:
